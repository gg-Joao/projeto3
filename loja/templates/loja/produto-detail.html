{% extends 'loja/base.html' %}

{% block title %}Detalhe do Produto{% endblock %}

{% block content %}
  <h1>Visualizar Produto</h1>
  <div class="mb-3">
    <label class="form-label">Produto</label>
    <input class="form-control" value="{{ produto.produto }}" readonly>
  </div>

  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" {% if produto.destaque %}checked{% endif %} disabled>
    <label class="form-check-label">Destaque</label>
  </div>

  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" {% if produto.promocao %}checked{% endif %} disabled>
    <label class="form-check-label">Promoção</label>
  </div>

  <div class="mb-3">
    <label class="form-label">Mensagem Promoção</label>
    <input class="form-control" value="{{ produto.msgPromocao }}" readonly>
  </div>

  <div class="mb-3">
    <label class="form-label">Preço</label>
    <input class="form-control" value="{{ produto.preco }}" readonly>
  </div>

  <div class="mb-3">
    <label class="form-label">Categoria</label>
    <select class="form-select" disabled>
      {% for c in categorias %}
        <option value="{{ c.id }}" {% if produto.categoria.id == c.id %}selected{% endif %}>{{ c.categoria }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">Fabricante</label>
    <select class="form-select" disabled>
      {% for f in fabricantes %}
        <option value="{{ f.id }}" {% if produto.fabricante.id == f.id %}selected{% endif %}>{{ f.fabricante }}</option>
      {% endfor %}
    </select>
  </div>

  {% if produto.imagem %}
    <div class="mb-3">
      <label class="form-label">Imagem</label>
      <div><img src="{{ produto.imagem.url }}" style="max-height:240px;"></div>
    </div>
  {% endif %}

  <a class="btn btn-secondary" href="{% url 'produto_list' %}">Retornar</a>
  <a class="btn btn-warning" href="{% url 'produto_edit' produto.id %}">Editar</a>
  <a class="btn btn-danger" href="{% url 'produto_delete' produto.id %}">Excluir</a>
{% endblock %}
