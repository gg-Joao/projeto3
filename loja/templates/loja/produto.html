{% extends 'loja/base.html' %}

{% block title %}Produtos - Loja{% endblock %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Produtos</h1>
    <a class="btn btn-success" href="{% url 'create_produto' %}"><i class="fa fa-plus"></i> Novo Produto</a>
  </div>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>ID</th>
        <th>Produto</th>
        <th>Preço</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      {% for p in produtos %}
      <tr>
        <td>{{ p.id }}</td>
        <td>{{ p.produto }}</td>
        <td>{{ p.preco }}</td>
        <td>
          <a class="btn btn-sm btn-primary" href="{% url 'produto_detail' p.id %}">Ver</a>
          <a class="btn btn-sm btn-warning" href="{% url 'produto_edit' p.id %}">Editar</a>
          <a class="btn btn-sm btn-danger" href="{% url 'produto_delete' p.id %}">Excluir</a>
        </td>
      </tr>
      {% empty %}
      <tr><td colspan="4">Nenhum produto encontrado.</td></tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
